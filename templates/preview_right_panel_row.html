<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>右侧队列行 - 预览模板 (420x120px)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px;
    gap: 40px;
    flex-wrap: wrap;
  }
  .preview-container {
    text-align: center;
  }
  .preview-label {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin-bottom: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ========== 右侧队列行样式 (420x120px) ========== */
  .row-wrapper {
    width: 420px;
    height: 120px;
  }
  .row-container {
    width: 420px;
    height: 120px;
    display: flex;
    align-items: center;
    padding: 8px 12px;
    position: relative;
  }
  .row-body {
    width: 100%;
    height: 100%;
    background: rgba(26,26,46,0.9);
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }

  /* 难度条 */
  .diff-bar {
    position: absolute;
    right: 0;
    top: 0;
    width: 4px;
    height: 100%;
    border-radius: 0 10px 10px 0;
  }
  .diff-bar-basic { background: linear-gradient(180deg, #22bb5b, #18a04a); }
  .diff-bar-advanced { background: linear-gradient(180deg, #fb9c2c, #e08520); }
  .diff-bar-expert { background: linear-gradient(180deg, #f64861, #d93d53); }
  .diff-bar-master { background: linear-gradient(180deg, #9e45e0, #8538c4); }
  .diff-bar-remaster { background: linear-gradient(180deg, #dbaaff, #f6b2ff); }
  .diff-bar-utage { background: linear-gradient(180deg, #ff69b4, #e0559d); }

  /* 封面区域 */
  .cover-area {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    border: 1px solid rgba(255,255,255,0.08);
  }
  .cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cover-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  }

  /* 信息区域 */
  .info-area {
    flex: 1;
    margin-left: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    overflow: hidden;
    padding-right: 10px;
  }
  .song-name {
    color: #fff;
    font-size: 23px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.4px;
  }
  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chart-badge {
    font-size: 13px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 3px;
    color: white;
    letter-spacing: 0.7px;
    flex-shrink: 0;
  }
  .chart-standard { background: rgba(255,255,255,0.12); }
  .chart-dx { background: rgba(255,80,80,0.55); }
  .chart-utage { background: rgba(255,105,180,0.55); }
  .level-text {
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    font-weight: 600;
  }

  /* 底部行 */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gift-value {
    color: #FFD700;
    font-size: 17px;
    font-weight: 600;
  }
  .requester {
    color: rgba(255,255,255,0.45);
    font-size: 16px;
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- 示例1: Master难度 + DX图表 + 礼物 -->
<div class="preview-container">
  <div class="preview-label">示例1: Master 13.7 + DX + 礼物</div>
  <div class="row-wrapper">
    <div class="row-container">
      <div class="row-body">
        <div class="diff-bar diff-bar-master"></div>
        <div class="cover-area">
          <img class="cover" src="https://picsum.photos/80/80?random=1" alt="cover">
        </div>
        <div class="info-area">
          <div class="song-name">ギルドロップス</div>
          <div class="meta-row">
            <span class="chart-badge chart-dx">DX</span>
            <span class="level-text">LV 13.7</span>
          </div>
          <div class="bottom-row">
            <span class="gift-value">🎁 ¥9.99</span>
            <span class="requester">by 张三</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 示例2: Re:MASTER难度 + STD图表 -->
<div class="preview-container">
  <div class="preview-label">示例2: Re:MASTER 14.5 + STD</div>
  <div class="row-wrapper">
    <div class="row-container">
      <div class="row-body">
        <div class="diff-bar diff-bar-remaster"></div>
        <div class="cover-area">
          <img class="cover" src="https://picsum.photos/80/80?random=2" alt="cover">
        </div>
        <div class="info-area">
          <div class="song-name">Vibrant Evolution</div>
          <div class="meta-row">
            <span class="chart-badge chart-standard">STD</span>
            <span class="level-text">LV 14.5</span>
          </div>
          <div class="bottom-row">
            <span class="requester">by 李四</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 示例3: Expert难度 + 无封面 -->
<div class="preview-container">
  <div class="preview-label">示例3: Expert 12.2 + DX (无封面)</div>
  <div class="row-wrapper">
    <div class="row-container">
      <div class="row-body">
        <div class="diff-bar diff-bar-expert"></div>
        <div class="cover-area">
          <div class="cover-placeholder"></div>
        </div>
        <div class="info-area">
          <div class="song-name">春眠</div>
          <div class="meta-row">
            <span class="chart-badge chart-dx">DX</span>
            <span class="level-text">LV 12.2</span>
          </div>
          <div class="bottom-row">
            <span class="requester">by 王五</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 示例4: Basic难度 -->
<div class="preview-container">
  <div class="preview-label">示例4: Basic 5.0 + STD</div>
  <div class="row-wrapper">
    <div class="row-container">
      <div class="row-body">
        <div class="diff-bar diff-bar-basic"></div>
        <div class="cover-area">
          <img class="cover" src="https://picsum.photos/80/80?random=4" alt="cover">
        </div>
        <div class="info-area">
          <div class="song-name">初音ミクの消失</div>
          <div class="meta-row">
            <span class="chart-badge chart-standard">STD</span>
            <span class="level-text">LV 5.0</span>
          </div>
          <div class="bottom-row">
            <span class="gift-value">🎁 ¥19.99</span>
            <span class="requester">by 赵六</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
