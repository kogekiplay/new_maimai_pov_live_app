<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>右侧队列行 - 方案1: 封面彩色边框 (420x120px)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px;
    gap: 40px;
    flex-wrap: wrap;
  }
  .preview-container {
    text-align: center;
  }
  .preview-label {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin-bottom: 16px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  /* ========== 方案1: 封面彩色边框 ========== */
  .row-wrapper {
    width: 420px;
    height: 120px;
  }
  .row-container {
    width: 420px;
    height: 120px;
    display: flex;
    align-items: center;
    padding: 8px 12px;
    position: relative;
  }
  .row-body {
    width: 100%;
    height: 100%;
    background: rgba(26,26,46,0.9);
    border-radius: 10px;
    display: flex;
    align-items: center;
    padding: 10px 12px;
    position: relative;
    overflow: hidden;
  }

  /* 封面区域 - 彩色边框 */
  .cover-area {
    width: 80px;
    height: 80px;
    border-radius: 8px;
    overflow: hidden;
    flex-shrink: 0;
    position: relative;
  }
  /* 难度彩色边框 */
  .cover-area::before {
    content: '';
    position: absolute;
    top: -3px;
    left: -3px;
    right: -3px;
    bottom: -3px;
    border-radius: 10px;
    z-index: 1;
  }
  .diff-basic::before {
    background: linear-gradient(135deg, #22bb5b, #18a04a);
  }
  .diff-advanced::before {
    background: linear-gradient(135deg, #fb9c2c, #e08520);
  }
  .diff-expert::before {
    background: linear-gradient(135deg, #f64861, #d93d53);
  }
  .diff-master::before {
    background: linear-gradient(135deg, #9e45e0, #8538c4);
  }
  .diff-remaster::before {
    background: linear-gradient(135deg, #dbaaff, #f6b2ff);
  }
  .diff-utage::before {
    background: linear-gradient(135deg, #ff69b4, #e0559d);
  }
  .cover-wrapper {
    width: 100%;
    height: 100%;
    border-radius: 7px;
    overflow: hidden;
    position: relative;
    z-index: 2;
    background: #111;
  }
  .cover {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .cover-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
  }

  /* 信息区域 */
  .info-area {
    flex: 1;
    margin-left: 14px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    overflow: hidden;
    padding-right: 10px;
  }
  .song-name {
    color: #fff;
    font-size: 23px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.4px;
  }
  .meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chart-badge {
    font-size: 13px;
    font-weight: 800;
    padding: 2px 8px;
    border-radius: 3px;
    color: white;
    letter-spacing: 0.7px;
    flex-shrink: 0;
  }
  .chart-standard { background: rgba(255,255,255,0.12); }
  .chart-dx { background: rgba(255,80,80,0.55); }
  .chart-utage { background: rgba(255,105,180,0.55); }
  .level-text {
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    font-weight: 600;
  }

  /* 底部行 */
  .bottom-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .gift-value {
    color: #FFD700;
    font-size: 17px;
    font-weight: 600;
  }
  .requester {
    color: rgba(255,255,255,0.45);
    font-size: 16px;
    font-weight: 500;
  }
</style>
</head>
<body>

<!-- 示例1: Master难度 + DX图表 + 礼物 -->
<div class="preview-container">
  <div class="preview-label">方案1: Master + 彩色边框</div>
  <div class="row-wrapper">
    <div class="row-container">
      <div class="row-body">
        <div class="cover-area diff-master">
          <div class="cover-wrapper">
            <img class="cover" src="https://picsum.photos/80/80?random=1" alt="cover">
          </div>
        </div>
        <div class="info-area">
          <div class="song-name">ギルドロップス</div>
          <div class="meta-row">
            <span class="chart-badge chart-dx">DX</span>
            <span class="level-text">LV 13.7</span>
          </div>
          <div class="bottom-row">
            <span class="gift-value">🎁 ¥9.99</span>
            <span class="requester">by 张三</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
