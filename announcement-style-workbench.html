<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>公告面板样式调整工具 - 实时预览</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    margin: 0;
    padding: 20px;
    background: #0a0a0a;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: #fff;
  }

  h1 {
    text-align: center;
    color: #ffd93d;
    font-size: 28px;
    margin-bottom: 10px;
  }

  .subtitle {
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin-bottom: 30px;
  }

  .main-container {
    display: flex;
    gap: 40px;
    justify-content: center;
    align-items: flex-start;
    flex-wrap: wrap;
    padding: 20px;
  }

  /* 控制面板 */
  .control-panel {
    background: rgba(30,30,35,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 24px;
    width: 380px;
    height: fit-content;
  }

  .control-title {
    color: #ffd93d;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .control-group {
    margin-bottom: 18px;
  }

  .control-label {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
  }

  .control-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  input[type="range"] {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.15);
    border-radius: 3px;
    outline: none;
    -webkit-appearance: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    background: #ffd93d;
    border-radius: 50%;
    cursor: pointer;
  }

  .value-display {
    min-width: 50px;
    text-align: right;
    color: #4fc3f7;
    font-size: 14px;
    font-weight: 600;
    font-family: 'Monaco', 'Consolas', monospace;
  }

  .preset-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 20px;
  }

  .preset-btn {
    padding: 10px;
    background: rgba(79,195,247,0.15);
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: 6px;
    color: #4fc3f7;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .preset-btn:hover {
    background: rgba(79,195,247,0.25);
    transform: translateY(-1px);
  }

  /* 预览区域 */
  .preview-area {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .preview-label {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-weight: 600;
    text-align: center;
  }

  /* 公告面板预览 */
  .announcement-panel {
    width: 420px;
    height: 324px;
    background: rgba(17,17,17,0.85);
    position: relative;
    overflow: hidden;
  }

  .announcement-container {
    width: 100%;
    height: 100%;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .announcement-title {
    letter-spacing: 0.5px;
  }

  .announcement-content {
    white-space: pre-wrap;
    word-break: break-all;
    flex: 1;
  }

  /* 测试文本选择器 */
  .text-selector {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .text-selector label {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
  }

  .text-selector select {
    width: 100%;
    padding: 8px 12px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 6px;
    color: #fff;
    font-size: 14px;
    cursor: pointer;
  }

  .text-selector select option {
    background: #1e1e24;
    color: #fff;
  }

  /* CSS输出区域 */
  .css-output {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }

  .css-output label {
    color: rgba(255,255,255,0.85);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
    display: block;
  }

  .css-code {
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 6px;
    padding: 12px;
    font-family: 'Monaco', 'Consolas', monospace;
    font-size: 11px;
    color: #4fc3f7;
    line-height: 1.5;
    max-height: 200px;
    overflow-y: auto;
    white-space: pre-wrap;
    word-break: break-all;
  }
</style>
</head>
<body>

<h1>🎨 公告面板样式调整工作台</h1>
<p class="subtitle">拖动滑块实时预览效果 | 调整到满意后告诉我具体参数</p>

<div class="main-container">
  <!-- 控制面板 -->
  <div class="control-panel">
    <div class="control-title">⚙️ 样式参数控制</div>

    <div class="control-group">
      <label class="control-label">标题字号 (原18px)</label>
      <div class="control-row">
        <input type="range" id="titleSize" min="16" max="28" value="22" step="1">
        <span class="value-display" id="titleSizeVal">22px</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">标题颜色透明度 (原70%)</label>
      <div class="control-row">
        <input type="range" id="titleOpacity" min="50" max="100" value="90" step="5">
        <span class="value-display" id="titleOpacityVal">90%</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">标题字重 (原700)</label>
      <div class="control-row">
        <input type="range" id="titleWeight" min="400" max="900" value="600" step="100">
        <span class="value-display" id="titleWeightVal">600</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">正文字号 (原20px)</label>
      <div class="control-row">
        <input type="range" id="contentSize" min="18" max="30" value="24" step="1">
        <span class="value-display" id="contentSizeVal">24px</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">正文颜色透明度 (原55%)</label>
      <div class="control-row">
        <input type="range" id="contentOpacity" min="50" max="100" value="80" step="5">
        <span class="value-display" id="contentOpacityVal">80%</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">正文字重 (原500)</label>
      <div class="control-row">
        <input type="range" id="contentWeight" min="300" max="700" value="400" step="100">
        <span class="value-display" id="contentWeightVal">400</span>
      </div>
    </div>

    <div class="control-group">
      <label class="control-label">容器内边距 (原16px 20px)</label>
      <div class="control-row">
        <input type="range" id="padding" min="8" max="24" value="14" step="2">
        <span class="value-display" id="paddingVal">14px</span>
      </div>
    </div>

    <div class="text-selector">
      <label>测试文本内容</label>
      <select id="testText">
        <option value="short">短文本：暂无公告</option>
        <option value="medium" selected>中等长度：欢迎来到直播间！\n请遵守直播间规则\n点歌请发送：点歌 歌名</option>
        <option value="long">长文本：1. 请文明发言\n2. 禁止刷屏广告\n3. 点歌格式：点歌 歌名 难度\n4. 礼物感谢名单将在每局结束后展示\n5. 违规者将被禁言处理</option>
        <option value="extralong">超长单行：这是一段非常非常非常非常非常非常非常非常非常非常非常非常长的单行文字用于测试自动换行功能是否正常工作</option>
      </select>
    </div>

    <div class="preset-buttons">
      <button class="preset-btn" onclick="applyPreset('original')">📋 原始样式</button>
      <button class="preset-btn" onclick="applyPreset('minimal')">✨ 极简增强</button>
      <button class="preset-btn" onclick="applyPreset('highContrast')">💡 高对比度</button>
      <button class="preset-btn" onclick="applyPreset('largeText')">🔤 大字版</button>
    </div>

    <div class="css-output">
      <label>生成的CSS代码（确认后我将使用这些值）：</label>
      <div class="css-code" id="cssOutput"></div>
    </div>
  </div>

  <!-- 预览区域 -->
  <div class="preview-area">
    <div class="preview-label">【实时预览】公告面板效果</div>
    <div class="announcement-panel">
      <div class="announcement-container">
        <div class="announcement-title" id="previewTitle">📢 公告</div>
        <div class="announcement-content" id="previewContent">欢迎来到直播间！
请遵守直播间规则
点歌请发送：点歌 歌名</div>
      </div>
    </div>

    <div class="preview-label" style="margin-top: 20px;">【对照】原始样式参考</div>
    <div class="announcement-panel" style="opacity: 0.7;">
      <div style="width: 100%; height: 100%; padding: 16px 20px; display: flex; flex-direction: column; gap: 10px;">
        <div style="color: rgba(255,255,255,0.7); font-size: 18px; font-weight: 700; letter-spacing: 1px;">📢 公告</div>
        <div style="height: 1px; background: rgba(255,255,255,0.15);"></div>
        <div style="color: rgba(255,255,255,0.55); font-size: 20px; font-weight: 500; line-height: 1.6; white-space: pre-wrap; word-break: break-all; flex: 1;">欢迎来到直播间！
请遵守直播间规则
点歌请发送：点歌 歌名</div>
      </div>
    </div>
  </div>
</div>

<script>
  // 获取所有控制元素
  const controls = {
    titleSize: document.getElementById('titleSize'),
    titleOpacity: document.getElementById('titleOpacity'),
    titleWeight: document.getElementById('titleWeight'),
    contentSize: document.getElementById('contentSize'),
    contentOpacity: document.getElementById('contentOpacity'),
    contentWeight: document.getElementById('contentWeight'),
    padding: document.getElementById('padding'),
    testText: document.getElementById('testText')
  };

  const previews = {
    title: document.getElementById('previewTitle'),
    content: document.getElementById('previewContent'),
    container: document.querySelector('.announcement-container')
  };

  const displays = {
    titleSize: document.getElementById('titleSizeVal'),
    titleOpacity: document.getElementById('titleOpacityVal'),
    titleWeight: document.getElementById('titleWeightVal'),
    contentSize: document.getElementById('contentSizeVal'),
    contentOpacity: document.getElementById('contentOpacityVal'),
    contentWeight: document.getElementById('contentWeightVal'),
    padding: document.getElementById('paddingVal')
  };

  const cssOutput = document.getElementById('cssOutput');

  // 测试文本内容
  const testTexts = {
    short: "暂无公告",
    medium: "欢迎来到直播间！\n请遵守直播间规则\n点歌请发送：点歌 歌名",
    long: "1. 请文明发言\n2. 禁止刷屏广告\n3. 点歌格式：点歌 歌名 难度\n4. 礼物感谢名单将在每局结束后展示\n5. 违规者将被禁言处理",
    extralong: "这是一段非常非常非常非常非常非常非常非常非常非常非常非常长的单行文字用于测试自动换行功能是否正常工作"
  };

  // 更新预览函数
  function updatePreview() {
    const titleSize = controls.titleSize.value + 'px';
    const titleColor = `rgba(255,255,255,${controls.titleOpacity.value / 100})`;
    const titleWeight = controls.titleWeight.value;
    const contentSize = controls.contentSize.value + 'px';
    const contentColor = `rgba(255,255,255,${controls.contentOpacity.value / 100})`;
    const contentWeight = controls.contentWeight.value;
    const paddingVal = controls.padding.value + 'px';

    // 应用样式
    previews.title.style.fontSize = titleSize;
    previews.title.style.color = titleColor;
    previews.title.style.fontWeight = titleWeight;

    previews.content.style.fontSize = contentSize;
    previews.content.style.color = contentColor;
    previews.content.style.fontWeight = contentWeight;

    previews.container.style.padding = `${paddingVal} ${parseInt(paddingVal) * 1.28}px`;

    // 更新显示值
    displays.titleSize.textContent = titleSize;
    displays.titleOpacity.textContent = controls.titleOpacity.value + '%';
    displays.titleWeight.textContent = titleWeight;
    displays.contentSize.textContent = contentSize;
    displays.contentOpacity.textContent = controls.contentOpacity.value + '%';
    displays.contentWeight.textContent = contentWeight;
    displays.padding.textContent = paddingVal;

    // 更新测试文本
    previews.content.textContent = testTexts[controls.testText.value];

    // 生成CSS代码
    generateCSS();
  }

  // 生成CSS代码
  function generateCSS() {
    const css = `.announcement-title {
  font-size: ${controls.titleSize.value}px;  /* 原18px */
  color: rgba(255,255,255,${(controls.titleOpacity.value / 100).toFixed(2)});  /* 原0.7 */
  font-weight: ${controls.titleWeight.value};  /* 原700 */
  letter-spacing: 0.5px;  /* 原1px */
}

.announcement-content {
  font-size: ${controls.contentSize.value}px;  /* 原20px */
  color: rgba(255,255,255,${(controls.contentOpacity.value / 100).toFixed(2)});  /* 原0.55 */
  font-weight: ${controls.contentWeight.value};  /* 原500 */
  line-height: 1.5;  /* 原1.6 */
}

.announcement-container {
  padding: ${controls.padding.value}px ${Math.round(controls.padding.value * 1.28)}px;  /* 原16px 20px */
  gap: 8px;  /* 原10px */
}`;

    cssOutput.textContent = css;
  }

  // 预设方案
  function applyPreset(preset) {
    switch(preset) {
      case 'original':
        controls.titleSize.value = 18;
        controls.titleOpacity.value = 70;
        controls.titleWeight.value = 700;
        controls.contentSize.value = 20;
        controls.contentOpacity.value = 55;
        controls.contentWeight.value = 500;
        controls.padding.value = 16;
        break;
      case 'minimal':
        controls.titleSize.value = 22;
        controls.titleOpacity.value = 90;
        controls.titleWeight.value = 600;
        controls.contentSize.value = 24;
        controls.contentOpacity.value = 80;
        controls.contentWeight.value = 400;
        controls.padding.value = 14;
        break;
      case 'highContrast':
        controls.titleSize.value = 24;
        controls.titleOpacity.value = 95;
        controls.titleWeight.value = 700;
        controls.contentSize.value = 26;
        controls.contentOpacity.value = 90;
        controls.contentWeight.value = 500;
        controls.padding.value = 14;
        break;
      case 'largeText':
        controls.titleSize.value = 26;
        controls.titleOpacity.value = 95;
        controls.titleWeight.value = 700;
        controls.contentSize.value = 28;
        controls.contentOpacity.value = 90;
        controls.contentWeight.value = 600;
        controls.padding.value = 12;
        break;
    }
    updatePreview();
  }

  // 绑定事件监听器
  Object.values(controls).forEach(control => {
    if (control.tagName === 'SELECT' || control.type === 'range') {
      control.addEventListener('input', updatePreview);
      control.addEventListener('change', updatePreview);
    }
  });

  // 初始化
  updatePreview();

  console.log('🎨 公告面板样式调整工作台已加载');
  console.log('提示：拖动滑块可以实时看到效果变化');
  console.log('当你满意后，将"生成的CSS代码"部分发给我即可');
</script>

</body>
</html>
