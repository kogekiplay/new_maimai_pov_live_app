name: MaimaiPOV
options:
  bundleIdPrefix: com.maimai
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  HaishinKit:
    path: ./HaishinKit_source
  Swifter:
    url: https://github.com/httpswift/swifter
    minorVersion: 1.5

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: MaimaiPOV/App/Info.plist
    METAL_LIBRARY_FILE_BASE: default
    COREML_CODEGEN_LANGUAGE: Swift
    OTHER_LDFLAGS: ["-ObjC"]
    ENABLE_BITCODE: NO
    DEAD_CODE_STRIPPING: YES

targets:
  MaimaiPOV:
    type: application
    platform: iOS
    sources:
      - path: MaimaiPOV
        excludes:
          - "**/*.onnx"
          - "**/*.pt"
          - "**/*.zip"
          - "Tracking/Models/convert_coreml.py"
          - "SongRequest/song_list.json"
          - "SongRequest/alias_list.json"
      - path: MaimaiPOV/Tracking/Models/best.mlpackage
        buildPhase: sources
        type: folder
        settings:
          base:
            CODE_GEN: class
      - path: MaimaiPOV/SongRequest
        buildPhase: resources
        type: folder
      - path: MaimaiPOV/WebServer/control.html
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.maimai.MaimaiPOV
        INFOPLIST_FILE: MaimaiPOV/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        DEVELOPMENT_TEAM: ""
        ARCHS: arm64
        VALID_ARCHS: arm64
        ONLY_ACTIVE_ARCH: YES
        CLANG_ENABLE_MODULES: YES
        OTHER_SWIFT_FLAGS: ["-Xfrontend", "-warn-long-expression-type-checking=200"]
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_COMPILATION_MODE: singlefile
          MTLENGINE_DEFAULT_OPTIMIZATION_LEVEL: "-O0"
          GCC_OPTIMIZATION_LEVEL: "0"
          STRIP_INSTALLED_PRODUCT: NO
          COPY_PHASE_STRIP: NO
          ENABLE_NS_ASSERTIONS: YES
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          MTLENGINE_DEFAULT_OPTIMIZATION_LEVEL: "-O"
          GCC_OPTIMIZATION_LEVEL: s
          STRIP_INSTALLED_PRODUCT: YES
          COPY_PHASE_STRIP: YES
          ENABLE_NS_ASSERTIONS: NO
    dependencies:
      - package: HaishinKit
        product: HaishinKit
      - package: Swifter
    entitlements:
      path: MaimaiPOV/App/MaimaiPOV.entitlements
      properties:
        com.apple.developer.networking.multipath: true
        com.apple.developer.networking.wifi-info: true
