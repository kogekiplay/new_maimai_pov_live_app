name: Build iOS App

# Trigger on pushes, pull requests, or manual dispatch
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Archive
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Core ML Model
        run: |
          if [ -d "MaimaiPOV/Tracking/Models/maimai_bbox_v1.mlpackage" ]; then
            echo "Core ML model found"
          else
            echo "WARNING: Core ML model not found — tracking won't work until Phase 3"
          fi

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: |
          xcodegen generate
          echo "=== Project generated ==="

      - name: Select iOS Simulator
        id: simulator
        run: |
          DESTINATION=$(python3 - <<'PY'
          import json
          import subprocess

          devices = json.loads(
              subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          )
          for runtime, runtime_devices in devices.get("devices", {}).items():
              if "iOS" not in runtime:
                  continue
              for device in runtime_devices:
                  if device.get("isAvailable") and device.get("name", "").startswith("iPhone"):
                      print(f"platform=iOS Simulator,id={device['udid']}")
                      raise SystemExit(0)
          raise SystemExit("No available iPhone simulator found")
          PY
          )
          echo "destination=$DESTINATION" >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -project MaimaiPOV.xcodeproj \
            -scheme MaimaiPOV \
            -destination "${{ steps.simulator.outputs.destination }}" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1

      - name: Build Archive
        run: |
          xcodebuild archive \
            -project MaimaiPOV.xcodeproj \
            -scheme MaimaiPOV \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath build/MaimaiPOV.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1

      - name: Find Built App
        id: find-app
        run: |
          APP_PATH=$(find build/ -name "*.app" -type d 2>/dev/null | head -1)
          echo "Found app at: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_OUTPUT

      - name: Export IPA
        run: |
          mkdir -p build/ipa/Payload
          cp -r "${{ steps.find-app.outputs.app_path }}" build/ipa/Payload/ 2>/dev/null || \
          cp -r "build/MaimaiPOV.xcarchive/Products/Applications/MaimaiPOV.app" build/ipa/Payload/
          cd build/ipa
          zip -r MaimaiPOV.ipa Payload/
          cd ../..
          echo "=== IPA created ==="
          ls -lh build/ipa/MaimaiPOV.ipa

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v7
        with:
          name: MaimaiPOV
          path: build/ipa/MaimaiPOV.ipa
          retention-days: 30
