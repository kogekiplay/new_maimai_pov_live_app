<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>点歌队列</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:linear-gradient(135deg,#1a0a2e 0%,#2d1b4e 100%);color:#e0d0f0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding-bottom:80px}
.queue-section{padding:8px 12px 0}
.queue-header{display:flex;align-items:center;justify-content:space-between;padding:4px 0 8px}
.queue-header .remaining{font-size:12px;color:#8b7ba8}
.queue-header .remaining span{color:#ff6b9d;font-weight:600}
.queue-empty{text-align:center;padding:40px 20px;color:#6b5b8a;font-size:14px}
.song-card{background:rgba(45,27,78,0.8);border-radius:12px;margin-bottom:8px;overflow:hidden;display:flex;align-items:stretch;position:relative;transition:transform 0.15s}
.song-card.current{border:1px solid rgba(255,107,157,0.4);box-shadow:0 0 12px rgba(255,107,157,0.15)}
.song-card.priority{border:1px solid rgba(255,193,7,0.3)}
.diff-bar{width:4px;flex-shrink:0;border-radius:2px 0 0 2px}
.diff-basic{background:#22bb5b}
.diff-advanced{background:#fb9c2c}
.diff-expert{background:#f64861}
.diff-master{background:#9e45e2}
.diff-remaster{background:#dbaaff}
.diff-utage{background:#ff6b9d}
.card-cover{width:56px;height:56px;flex-shrink:0;margin:8px 0 8px 8px;border-radius:8px;object-fit:cover;background:rgba(30,15,50,0.6)}
.card-body{flex:1;padding:8px 8px 8px 10px;min-width:0}
.card-top{display:flex;align-items:center;gap:6px;margin-bottom:3px}
.song-name{font-size:13px;font-weight:600;color:#f0e6ff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.chart-badge{font-size:9px;padding:1px 5px;border-radius:4px;font-weight:600;flex-shrink:0}
.chart-dx{background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff}
.chart-std{background:rgba(192,132,252,0.3);color:#c084fc}
.chart-utage{background:rgba(255,107,157,0.3);color:#ff6b9d}
.priority-badge{font-size:9px;padding:1px 5px;border-radius:4px;background:rgba(255,193,7,0.3);color:#ffc107;flex-shrink:0}
.card-info{display:flex;align-items:center;gap:6px;font-size:10px;color:#8b7ba8;flex-wrap:wrap}
.card-info .difficulty{font-weight:600}
.card-info .bpm{color:#6b8ba8}
.card-info .requester{margin-left:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:70px}
.card-actions{display:flex;align-items:center;justify-content:center;padding:6px 6px;flex-shrink:0}
.card-actions button{width:26px;height:26px;border:none;border-radius:6px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;transition:opacity 0.15s}
.card-actions button:active{opacity:0.6}
.btn-remove{background:rgba(246,72,97,0.2);color:#f64861}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;display:flex;gap:8px;padding:12px 16px;background:rgba(26,10,46,0.95);backdrop-filter:blur(10px);z-index:10}
.bottom-bar button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.bottom-bar button:active{opacity:0.7}
.btn-skip{background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff}
.btn-clear{background:rgba(246,72,97,0.2);color:#f64861;border:1px solid rgba(246,72,97,0.3)!important}
.search-section{padding:8px 12px 16px}
.search-section h2{font-size:14px;color:#c084fc;margin-bottom:8px;font-weight:600}
.search-box{display:flex;gap:8px;margin-bottom:12px}
.search-box input{flex:1;padding:10px 14px;border:1px solid rgba(192,132,252,0.3);border-radius:10px;background:rgba(45,27,78,0.6);color:#f0e6ff;font-size:14px;outline:none}
.search-box input::placeholder{color:#6b5b8a}
.search-box input:focus{border-color:rgba(255,107,157,0.5)}
.search-box button{padding:10px 18px;border:none;border-radius:10px;background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.search-box button:active{opacity:0.7}
.search-results{display:none}
.search-result{background:rgba(45,27,78,0.6);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.sr-cover{width:48px;height:48px;flex-shrink:0;border-radius:8px;object-fit:cover;background:rgba(30,15,50,0.6)}
.sr-info{flex:1;min-width:0}
.sr-info .sr-title{font-size:13px;font-weight:600;color:#f0e6ff;margin-bottom:2px;display:flex;align-items:center;gap:5px}
.sr-info .sr-title .song-title{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-info .sr-artist{font-size:10px;color:#8b7ba8;margin-bottom:2px}
.sr-info .sr-bpm{font-size:10px;color:#6b8ba8;margin-bottom:4px}
.sr-info .sr-diffs{display:flex;flex-wrap:wrap;gap:3px;align-items:center}
.sr-diff{font-size:9px;padding:2px 5px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all 0.15s}
.sr-diff:hover{border-color:rgba(255,255,255,0.3)}
.sr-diff.selected{border-color:#ff6b9d;box-shadow:0 0 6px rgba(255,107,157,0.3)}
.sr-diff-basic{background:rgba(34,187,91,0.2);color:#22bb5b}
.sr-diff-advanced{background:rgba(251,156,44,0.2);color:#fb9c2c}
.sr-diff-expert{background:rgba(246,72,97,0.2);color:#f64861}
.sr-diff-master{background:rgba(158,69,226,0.2);color:#9e45e2}
.sr-diff-remaster{background:rgba(219,170,255,0.2);color:#dbaaff}
.sr-diff-utage{background:rgba(255,107,157,0.2);color:#ff6b9d}
.sr-add{padding:4px 10px;border:none;border-radius:6px;background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff;font-size:10px;font-weight:600;cursor:pointer;margin-left:auto;flex-shrink:0}
.sr-add:active{opacity:0.7}
.toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.8);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:100;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.show{opacity:1}
.debug-section{padding:8px 12px 16px}
.debug-toggle{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:rgba(45,27,78,0.6);border-radius:10px;cursor:pointer;margin-bottom:8px}
.debug-toggle h2{font-size:14px;color:#c084fc;font-weight:600;margin:0}
.debug-toggle .arrow{color:#8b7ba8;transition:transform 0.2s;font-size:12px}
.debug-toggle .arrow.open{transform:rotate(180deg)}
.debug-panel{display:none}
.debug-panel.open{display:block}
.debug-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.debug-row label{font-size:11px;color:#8b7ba8;min-width:50px}
.debug-row input,.debug-row select{flex:1;padding:6px 10px;border:1px solid rgba(192,132,252,0.3);border-radius:6px;background:rgba(45,27,78,0.6);color:#f0e6ff;font-size:12px;outline:none}
.debug-row input::placeholder{color:#6b5b8a}
.debug-row input:focus{border-color:rgba(255,107,157,0.5)}
.debug-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.debug-btn{padding:6px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.debug-btn:active{opacity:0.7}
.debug-btn-gift{background:rgba(34,187,91,0.2);color:#22bb5b;border:1px solid rgba(34,187,91,0.3)}
.debug-btn-sc{background:rgba(255,193,7,0.2);color:#ffc107;border:1px solid rgba(255,193,7,0.3)}
.debug-btn-member{background:rgba(192,132,252,0.2);color:#c084fc;border:1px solid rgba(192,132,252,0.3)}
.debug-btn-clear{background:rgba(246,72,97,0.2);color:#f64861;border:1px solid rgba(246,72,97,0.3)}
.debug-btn-add{background:linear-gradient(135deg,#ff6b9d,#c084fc);color:#fff}
.debug-btn-refresh{background:rgba(192,132,252,0.2);color:#c084fc;border:1px solid rgba(192,132,252,0.3)}
</style>
</head>
<body>
<div class="queue-section">
<div class="queue-header">
<div class="remaining" id="remainingInfo"></div>
</div>
<div id="queueList"><div class="queue-empty">暂无歌曲</div></div>
</div>
<div class="search-section">
<h2>🔍 搜索添加</h2>
<div class="search-box">
<input type="text" id="searchInput" placeholder="输入歌名、别名或ID" />
<button onclick="doSearch()">搜索</button>
</div>
<div class="search-results" id="searchResults"></div>
</div>
<div class="debug-section">
<div class="debug-toggle" onclick="toggleDebug()">
<h2>🔧 调试面板</h2>
<span class="arrow" id="debugArrow">▼</span>
</div>
<div class="debug-panel" id="debugPanel">
<div class="debug-row">
<label>用户名</label>
<input type="text" id="debugUsername" placeholder="输入用户名" />
</div>
<div class="debug-btns">
<button class="debug-btn debug-btn-gift" onclick="simGift()">🎁 模拟礼物</button>
<button class="debug-btn debug-btn-sc" onclick="simSC()">💰 模拟SC(≥30)</button>
<button class="debug-btn debug-btn-sc" onclick="simSCSmall()">💵 模拟SC(&lt;30)</button>
<button class="debug-btn debug-btn-member" onclick="simMember()">⚓ 模拟上舰</button>
</div>
<div class="debug-row">
<label>弹幕内容</label>
<input type="text" id="debugDanmaku" placeholder="点歌 歌名 [难度]" />
</div>
<div class="debug-btns">
<button class="debug-btn debug-btn-gift" onclick="simDanmaku()">💬 模拟弹幕点歌</button>
<button class="debug-btn debug-btn-sc" onclick="simSCSong()">🎤 模拟SC点歌</button>
</div>
<div class="debug-btns">
<button class="debug-btn debug-btn-refresh" onclick="fetchGiftPool()">🎁 刷新送礼池</button>
</div>
<div class="perm-list" id="giftPoolList" style="margin-top:8px"><div class="perm-empty">点击"刷新送礼池"查看</div></div>
<h3 style="margin:12px 0 6px;color:#ba68c8">📢 公告编辑</h3>
<textarea id="announcementText" rows="3" style="width:100%;background:#1a1a2e;color:#e0e0e0;border:1px solid #333;border-radius:6px;padding:8px;font-size:14px;resize:vertical" placeholder="输入公告内容..."></textarea>
<button class="debug-btn debug-btn-refresh" onclick="updateAnnouncement()" style="margin-top:6px">📢 更新公告</button>
<h3 style="margin:12px 0 6px;color:#ff6b9d">🔥 压力测试</h3>
<div class="debug-row">
<label>时长(秒)</label>
<input type="number" id="stressDuration" value="300" min="30" max="1800" />
</div>
<div class="debug-row">
<label>弹幕/秒</label>
<input type="number" id="stressDanmakuRate" value="3" min="0" max="20" />
</div>
<div class="debug-row">
<label>礼物/秒</label>
<input type="number" id="stressGiftRate" value="1" min="0" max="10" />
</div>
<div class="debug-row">
<label>SC/秒</label>
<input type="number" id="stressSCRate" value="0.3" min="0" max="5" step="0.1" />
</div>
<div class="debug-row">
<label>切歌间隔(秒)</label>
<input type="number" id="stressSkipInterval" value="60" min="10" max="300" />
</div>
<div class="debug-btns">
<button class="debug-btn" style="background:linear-gradient(135deg,#ff6b9d,#ff9c6d);color:#fff" onclick="startStressTest()">🔥 开始压力测试</button>
<button class="debug-btn debug-btn-clear" onclick="stopStressTest()">⏹ 停止</button>
</div>
<div id="stressStatus" style="font-size:11px;color:#8b7ba8;margin-top:6px"></div>
</div>
</div>
<div class="bottom-bar">
<button class="btn-skip" onclick="skipSong()">⏭ 切歌</button>
<button class="btn-clear" onclick="clearQueue()">🗑 清空</button>
</div>
<div class="toast" id="toast"></div>
<script>
var lastQueueHash='';
var currentIndex=-1;
var coverCache={};
function showToast(msg){
var t=document.getElementById('toast');
t.textContent=msg;
t.classList.add('show');
setTimeout(function(){t.classList.remove('show')},1500);
}
function diffClass(diff){
var d=(diff||'').toLowerCase();
if(d.indexOf('basic')>=0)return'diff-basic';
if(d.indexOf('advanced')>=0)return'diff-advanced';
if(d.indexOf('expert')>=0)return'diff-expert';
if(d.indexOf('master')>=0&&d.indexOf('re')<0)return'diff-master';
if(d.indexOf('re:')>=0||d.indexOf('remaster')>=0)return'diff-remaster';
if(d.indexOf('utage')>=0)return'diff-utage';
return'diff-master';
}
function diffSmallClass(diff){
var d=(diff||'').toLowerCase();
if(d.indexOf('basic')>=0)return'sr-diff-basic';
if(d.indexOf('advanced')>=0)return'sr-diff-advanced';
if(d.indexOf('expert')>=0)return'sr-diff-expert';
if(d.indexOf('master')>=0&&d.indexOf('re')<0)return'sr-diff-master';
if(d.indexOf('re:')>=0||d.indexOf('remaster')>=0)return'sr-diff-remaster';
if(d.indexOf('utage')>=0)return'sr-diff-utage';
return'sr-diff-master';
}
function chartClass(ct){
if(ct==='dx')return'chart-dx';
if(ct==='standard'||ct==='std')return'chart-std';
if(ct==='utage')return'chart-utage';
return'chart-std';
}
function chartLabel(ct){
if(ct==='dx')return'DX';
if(ct==='standard')return'STD';
if(ct==='utage')return'UTAGE';
return(ct||'').toUpperCase();
}
function diffColor(diff){
var d=(diff||'').toLowerCase();
if(d.indexOf('basic')>=0)return'#22bb5b';
if(d.indexOf('advanced')>=0)return'#fb9c2c';
if(d.indexOf('expert')>=0)return'#f64861';
if(d.indexOf('master')>=0&&d.indexOf('re')<0)return'#9e45e2';
if(d.indexOf('re:')>=0||d.indexOf('remaster')>=0)return'#dbaaff';
if(d.indexOf('utage')>=0)return'#ff6b9d';
return'#9e45e2';
}
function escHtml(s){
if(!s)return'';
return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function queueHash(data){
if(!data||!data.queue)return'';
var parts=[];
for(var i=0;i<data.queue.length;i++){
var s=data.queue[i];
parts.push(s.songName+'|'+(s.difficulty||'')+'|'+(s.isPriority?'1':'0')+'|'+(s.requester||'')+'|'+(s.giftValue||0));
}
return data.currentIndex+'|'+data.remaining+'|'+parts.join(',');
}
function renderQueue(data){
currentIndex=data.currentIndex;
var remainingEl=document.getElementById('remainingInfo');
if(data.queue&&data.queue.length>0){
var rem=data.remaining||0;
remainingEl.innerHTML='剩余 <span>'+rem+'</span> 首待播';
}else{
remainingEl.innerHTML='';
}
var section=document.getElementById('queueList');
if(!data.queue||data.queue.length===0){
section.innerHTML='<div class="queue-empty">暂无歌曲</div>';
return;
}
var html='';
for(var i=0;i<data.queue.length;i++){
var s=data.queue[i];
var isCurrent=(i===currentIndex);
var cls='song-card';
if(isCurrent)cls+=' current';
if(s.isPriority)cls+=' priority';
html+='<div class="'+cls+'">';
html+='<div class="diff-bar '+diffClass(s.difficulty)+'"></div>';
if(s.coverURL){
html+='<img class="card-cover" src="'+escHtml(s.coverURL)+'" loading="lazy" onerror="this.style.display=\'none\'" />';
}else{
html+='<div class="card-cover"></div>';
}
html+='<div class="card-body">';
html+='<div class="card-top">';
html+='<span class="song-name">'+escHtml(s.songName)+'</span>';
if(s.chartType)html+='<span class="chart-badge '+chartClass(s.chartType)+'">'+chartLabel(s.chartType)+'</span>';
if(s.isPriority)html+='<span class="priority-badge">⚡插队</span>';
html+='</div>';
html+='<div class="card-info">';
if(s.difficulty)html+='<span class="difficulty" style="color:'+diffColor(s.difficulty)+'">'+escHtml(s.difficulty)+'</span>';
if(s.level)html+='<span>Lv.'+escHtml(s.level)+'</span>';
if(s.bpm)html+='<span class="bpm">♪'+s.bpm+'</span>';
if(s.requester)html+='<span class="requester">'+escHtml(s.requester)+'</span>';
if(s.giftValue>0)html+='<span style="color:#22bb5b;font-size:10px">🎁'+(s.giftValue/1000).toFixed(1)+'元</span>';
html+='</div>';
html+='</div>';
html+='<div class="card-actions">';
html+='<button class="btn-remove" onclick="removeSong('+i+')">✕</button>';
html+='</div>';
html+='</div>';
}
section.innerHTML=html;
}
function fetchQueue(){
var xhr=new XMLHttpRequest();
xhr.open('GET','/api/queue',true);
xhr.onload=function(){
if(xhr.status===200){
try{
var data=JSON.parse(xhr.responseText);
var h=queueHash(data);
if(h!==lastQueueHash){
lastQueueHash=h;
renderQueue(data);
}
}catch(e){}
}
};
xhr.onerror=function(){};
xhr.send();
}
function postAction(url,body,cb){
var xhr=new XMLHttpRequest();
xhr.open('POST',url,true);
xhr.setRequestHeader('Content-Type','application/json');
xhr.onload=function(){
if(xhr.status===200){
try{
var data=JSON.parse(xhr.responseText);
lastQueueHash=queueHash(data);
renderQueue(data);
if(cb)cb(data);
}catch(e){}
}else{
try{showToast(JSON.parse(xhr.responseText).message||'操作失败')}catch(e){showToast('操作失败')}
}
};
xhr.onerror=function(){showToast('网络错误')};
xhr.send(body?JSON.stringify(body):'{}');
}
function skipSong(){postAction('/api/queue/skip')}
function clearQueue(){postAction('/api/queue/clear')}
function removeSong(idx){postAction('/api/queue/remove',{index:idx})}
function doSearch(){
var q=document.getElementById('searchInput').value.trim();
if(!q)return;
var xhr=new XMLHttpRequest();
xhr.open('GET','/api/search?q='+encodeURIComponent(q),true);
xhr.onload=function(){
if(xhr.status===200){
try{renderSearchResults(JSON.parse(xhr.responseText))}catch(e){showToast('解析错误')}
}else{
showToast('搜索失败');
}
};
xhr.onerror=function(){showToast('网络错误')};
xhr.send();
}
function renderSearchResults(data){
var container=document.getElementById('searchResults');
if(!data.results||data.results.length===0){
container.style.display='block';
container.innerHTML='<div style="color:#6b5b8a;text-align:center;padding:16px;font-size:13px">未找到歌曲</div>';
return;
}
container.style.display='block';
var html='';
for(var i=0;i<data.results.length;i++){
var r=data.results[i];
html+='<div class="search-result">';
if(r.coverURL){
html+='<img class="sr-cover" src="'+escHtml(r.coverURL)+'" loading="lazy" onerror="this.style.display=\'none\'" />';
}else{
html+='<div class="sr-cover"></div>';
}
html+='<div class="sr-info">';
html+='<div class="sr-title">';
html+='<span class="song-title">'+escHtml(r.title)+'</span>';
if(r.chartType)html+='<span class="chart-badge '+chartClass(r.chartType)+'">'+chartLabel(r.chartType)+'</span>';
html+='</div>';
if(r.artist)html+='<div class="sr-artist">'+escHtml(r.artist)+'</div>';
if(r.bpm)html+='<div class="sr-bpm">♪ '+r.bpm+' BPM</div>';
html+='<div class="sr-diffs">';
var diffMap={};
if(r.difficulties){
for(var j=0;j<r.difficulties.length;j++){
var d=r.difficulties[j];
var key=d.name;
if(!diffMap[key])diffMap[key]=[];
diffMap[key].push(d);
}
var keys=Object.keys(diffMap);
for(var k=0;k<keys.length;k++){
var dn=keys[k];
var dv=diffMap[dn][0];
var sel=(k===keys.length-1)?' selected':'';
html+='<span class="sr-diff '+diffSmallClass(dn)+sel+'" data-diff-name="'+dn+'" data-music-id="'+r.musicId+'" data-chart-type="'+(r.chartType||'')+'" onclick="selectDiff(this)">'+dn+' Lv.'+dv.level+'</span>';
}
}
html+='<button class="sr-add" onclick="addSong(this)">添加</button>';
html+='</div>';
html+='</div>';
html+='</div>';
}
container.innerHTML=html;
}
function selectDiff(el){
var parent=el.parentElement;
var diffs=parent.querySelectorAll('.sr-diff');
for(var i=0;i<diffs.length;i++)diffs[i].classList.remove('selected');
el.classList.add('selected');
}
function addSong(btn){
var parent=btn.parentElement;
var sel=parent.querySelector('.sr-diff.selected');
if(!sel){showToast('请先选择难度');return}
var musicId=parseInt(sel.getAttribute('data-music-id'));
var chartType=sel.getAttribute('data-chart-type');
var diffName=sel.getAttribute('data-diff-name');
var diffMap={'BASIC':'绿','ADVANCED':'黄','EXPERT':'红','MASTER':'紫','Re:MASTER':'白','UTAGE':'宴'};
var diffInput=diffMap[diffName]||diffName;
postAction('/api/queue/add',{musicId:musicId,difficulty:diffInput,chartType:chartType},function(){
showToast('已添加');
});
}

function renderGiftPool(data){

if(!data.giftPool||data.giftPool.length===0){

var rmb=(p.giftValue/1000).toFixed(1);
html+='<div class="perm-item">';

html+='<span class="perm-chances">';
html+='<span style="color:#22bb5b">🎁'+p.giftValue+'币 (¥'+rmb+')</span>';
html+='</span>';
html+='</div>';
}
container.innerHTML=html;
}
function postDebug(url,body,cb){
var xhr=new XMLHttpRequest();
xhr.open('POST',url,true);
xhr.setRequestHeader('Content-Type','application/json');
xhr.onload=function(){
if(xhr.status===200){
try{
var data=JSON.parse(xhr.responseText);
if(cb)cb(data);
}catch(e){}
}else{
try{showToast(JSON.parse(xhr.responseText).message||'操作失败')}catch(e){showToast('操作失败')}
}
};
xhr.onerror=function(){showToast('网络错误')};
xhr.send(body?JSON.stringify(body):'{}');
}

var stressTestRunning=false;
var stressTestTimers=[];
var stressStats={danmaku:0,gift:0,sc:0,skip:0,errors:0};
var stressSongNames=['打上花火','Lemon','红莲华','残酷天使的行动纲领','Only My Railgun','Butter-Fly','魂之轮回','God knows...','Don\'t say "lazy"','Cry Baby','KICK BACK','残響散歌','アイドル','怪物','夜に駆ける','群青','うっせぇわ','ドライフラワー','Shape of You','Shin Takarajima','ファンサ','シャルル','ロキ','テオ','ハレハレヤ','ビターチョコデコレーション','命に嫌われている','クライマー','フォニイ','エンヴィーベイビー','きゅうくらりん','グッバイ宣言','シリウス','メリュー','ヴァンパイア','キリギリス','キャットラビング','デビルジョー','マリーゴールド','レオ','ピーターパン','フライミー','ストリーミングハート','スーサイドパレード','アンノウン','マチガイサガシ','コスモポップ','ヒバナ','アストロ'];
var stressUserNames=['小明的歌单','舞萌DX玩家','音游大佬','点歌达人','maimai爱好者','节奏大师','打歌人','萌新玩家','大佬来了','氪金战士','白嫖怪','舰长大人','SC狂魔','弹幕姬','直播间常客','路过的','新观众','老粉','铁粉','土豪哥'];
function stressRand(arr){return arr[Math.floor(Math.random()*arr.length)]}
function stressRandInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function stressSend(url,body,type){
var xhr=new XMLHttpRequest();
xhr.open('POST',url,true);
xhr.setRequestHeader('Content-Type','application/json');
xhr.onload=function(){
if(xhr.status===200){
stressStats[type]=(stressStats[type]||0)+1;
}else{
stressStats.errors++;
}
updateStressStatus();
};
xhr.onerror=function(){stressStats.errors++;updateStressStatus()};
xhr.send(JSON.stringify(body));
}
function updateStressStatus(){
var el=document.getElementById('stressStatus');
if(!stressTestRunning){return}
var elapsed=((Date.now()-stressStartTime)/1000).toFixed(0);
el.innerHTML='⏱ '+elapsed+'s | 💬 弹幕:'+stressStats.danmaku+' 🎁 礼物:'+stressStats.gift+' 💰 SC:'+stressStats.sc+' ⏭ 切歌:'+stressStats.skip+' ❌ 错误:'+stressStats.errors;
}
var stressStartTime=0;
function startStressTest(){
if(stressTestRunning){showToast('压力测试已在运行');return}
stressTestRunning=true;
stressStats={danmaku:0,gift:0,sc:0,skip:0,errors:0};
stressStartTime=Date.now();
var duration=parseInt(document.getElementById('stressDuration').value)||300;
var danmakuRate=parseFloat(document.getElementById('stressDanmakuRate').value)||3;
var giftRate=parseFloat(document.getElementById('stressGiftRate').value)||1;
var scRate=parseFloat(document.getElementById('stressSCRate').value)||0.3;
var skipInterval=parseInt(document.getElementById('stressSkipInterval').value)||60;
showToast('压力测试开始! '+duration+'秒');
if(danmakuRate>0){
var danmakuMs=Math.max(100,Math.round(1000/danmakuRate));
var t1=setInterval(function(){
if(!stressTestRunning)return;
var name=stressRand(stressUserNames);
var song=stressRand(stressSongNames);
var cmds=['点歌 '+song,'!点歌 '+song];
var content=stressRand(cmds);
stressSend('/api/debug/simulate/danmaku',{authorName:name,content:content},'danmaku');
},danmakuMs);
stressTestTimers.push(t1);
}
if(giftRate>0){
var giftMs=Math.max(200,Math.round(1000/giftRate));
var t2=setInterval(function(){
if(!stressTestRunning)return;
var name=stressRand(stressUserNames);
var coins=[1000,2000,5000,10000,50000,100000];
var coin=stressRand(coins);
stressSend('/api/debug/simulate/gift',{authorName:name,totalCoin:coin},'gift');
},giftMs);
stressTestTimers.push(t2);
}
if(scRate>0){
var scMs=Math.max(500,Math.round(1000/scRate));
var t3=setInterval(function(){
if(!stressTestRunning)return;
var name=stressRand(stressUserNames);
var prices=[10,30,50,100,200,500];
var price=stressRand(prices);
var song=stressRand(stressSongNames);
var scContents=['点歌 '+song,'','加油！','太好听了','再来一首','点歌'+song];
var content=stressRand(scContents);
stressSend('/api/debug/simulate/sc',{authorName:name,price:price,content:content},'sc');
},scMs);
stressTestTimers.push(t3);
}
if(skipInterval>0){
var t4=setInterval(function(){
if(!stressTestRunning)return;
stressSend('/api/queue/skip',{},'skip');
},skipInterval*1000);
stressTestTimers.push(t4);
}
var t5=setTimeout(function(){stopStressTest()},duration*1000);
stressTestTimers.push(t5);
updateStressStatus();
}
function stopStressTest(){
stressTestRunning=false;
for(var i=0;i<stressTestTimers.length;i++){clearInterval(stressTestTimers[i]);clearTimeout(stressTestTimers[i])}
stressTestTimers=[];
var el=document.getElementById('stressStatus');
var elapsed=((Date.now()-stressStartTime)/1000).toFixed(0);
el.innerHTML='✅ 测试结束! 用时'+elapsed+'秒 | 💬 弹幕:'+stressStats.danmaku+' 🎁 礼物:'+stressStats.gift+' 💰 SC:'+stressStats.sc+' ⏭ 切歌:'+stressStats.skip+' ❌ 错误:'+stressStats.errors;
showToast('压力测试已停止');
}
